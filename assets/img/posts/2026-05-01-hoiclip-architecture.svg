<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">HOICLIP Architecture Overview</title>
  <desc id="desc">A simplified SVG diagram showing the one-stage HOI detection pipeline and CLIP-based vision-language knowledge transfer used by HOICLIP.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="blueBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="purpleBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="greenBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="orangeBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="redBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 34px;
        font-weight: 800;
        fill: #0f172a;
      }
      .subtitle {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 17px;
        font-weight: 500;
        fill: #475569;
      }
      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        font-weight: 800;
        fill: #0f172a;
      }
      .small {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 500;
        fill: #334155;
      }
      .tiny {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        font-weight: 500;
        fill: #475569;
      }
      .box {
        stroke: #cbd5e1;
        stroke-width: 2;
        rx: 22;
        filter: url(#shadow);
      }
      .line {
        fill: none;
        stroke: #334155;
        stroke-width: 3;
        marker-end: url(#arrow);
      }
      .blueLine {
        fill: none;
        stroke: #2563eb;
        stroke-width: 3.5;
        marker-end: url(#arrowBlue);
      }
      .purpleLine {
        fill: none;
        stroke: #7c3aed;
        stroke-width: 3.5;
        stroke-dasharray: 10 8;
        marker-end: url(#arrowPurple);
      }
      .chip {
        fill: #ffffff;
        stroke: #cbd5e1;
        stroke-width: 1.5;
        rx: 12;
      }
      .note {
        fill: #ffffff;
        stroke: #e2e8f0;
        stroke-width: 1.5;
        rx: 18;
      }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <text x="640" y="54" text-anchor="middle" class="title">HOICLIP: Efficient Knowledge Transfer for HOI Detection</text>
  <text x="640" y="84" text-anchor="middle" class="subtitle">CVPR 2023 · One-Stage HOI Detection + CLIP Vision-Language Knowledge</text>

  <rect x="54" y="150" width="190" height="160" fill="url(#blueBox)" class="box"/>
  <text x="149" y="186" text-anchor="middle" class="label">Input Image</text>
  <rect x="92" y="210" width="55" height="70" rx="20" fill="#60a5fa" opacity="0.9"/>
  <circle cx="119" cy="200" r="18" fill="#1d4ed8" opacity="0.9"/>
  <rect x="158" y="224" width="48" height="42" rx="8" fill="#f97316" opacity="0.9"/>
  <line x1="135" y1="237" x2="158" y2="238" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
  <text x="149" y="296" text-anchor="middle" class="tiny">person + object scene</text>

  <rect x="300" y="150" width="210" height="160" fill="url(#greenBox)" class="box"/>
  <text x="405" y="184" text-anchor="middle" class="label">Visual</text>
  <text x="405" y="212" text-anchor="middle" class="label">Backbone</text>
  <rect x="333" y="235" width="144" height="38" class="chip"/>
  <text x="405" y="259" text-anchor="middle" class="small">image features</text>
  <text x="405" y="296" text-anchor="middle" class="tiny">CNN / Transformer feature map</text>

  <rect x="566" y="128" width="270" height="204" fill="url(#orangeBox)" class="box"/>
  <text x="701" y="164" text-anchor="middle" class="label">One-Stage</text>
  <text x="701" y="193" text-anchor="middle" class="label">HOI Detector</text>
  <rect x="600" y="218" width="204" height="34" class="chip"/>
  <text x="702" y="240" text-anchor="middle" class="small">interaction queries</text>
  <rect x="600" y="262" width="204" height="34" class="chip"/>
  <text x="702" y="284" text-anchor="middle" class="small">human/object boxes</text>
  <text x="701" y="318" text-anchor="middle" class="tiny">end-to-end relation prediction</text>

  <rect x="894" y="150" width="250" height="160" fill="url(#redBox)" class="box"/>
  <text x="1019" y="184" text-anchor="middle" class="label">HOI Output</text>
  <rect x="926" y="212" width="186" height="34" class="chip"/>
  <text x="1019" y="234" text-anchor="middle" class="small">&lt;person, ride, bike&gt;</text>
  <rect x="926" y="254" width="186" height="34" class="chip"/>
  <text x="1019" y="276" text-anchor="middle" class="small">&lt;person, hold, cup&gt;</text>
  <text x="1019" y="296" text-anchor="middle" class="tiny">human · verb · object triplets</text>

  <path d="M244 230 C266 230, 276 230, 300 230" class="line"/>
  <path d="M510 230 C536 230, 540 230, 566 230" class="line"/>
  <path d="M836 230 C862 230, 868 230, 894 230" class="line"/>

  <rect x="92" y="430" width="300" height="170" fill="url(#purpleBox)" class="box"/>
  <text x="242" y="465" text-anchor="middle" class="label">HOI Text Prompts</text>
  <rect x="122" y="492" width="240" height="32" class="chip"/>
  <text x="242" y="513" text-anchor="middle" class="small">a person riding a bicycle</text>
  <rect x="122" y="532" width="240" height="32" class="chip"/>
  <text x="242" y="553" text-anchor="middle" class="small">a person holding a cup</text>
  <text x="242" y="586" text-anchor="middle" class="tiny">verb-object labels → natural language</text>

  <rect x="478" y="430" width="260" height="170" fill="url(#purpleBox)" class="box"/>
  <text x="608" y="465" text-anchor="middle" class="label">CLIP Text</text>
  <text x="608" y="493" text-anchor="middle" class="label">Encoder</text>
  <rect x="518" y="522" width="180" height="38" class="chip"/>
  <text x="608" y="546" text-anchor="middle" class="small">text embeddings</text>
  <text x="608" y="586" text-anchor="middle" class="tiny">vision-language semantic prior</text>

  <rect x="824" y="430" width="330" height="170" fill="#ffffff" class="box"/>
  <text x="989" y="465" text-anchor="middle" class="label">Knowledge Transfer</text>
  <rect x="858" y="496" width="262" height="34" class="chip"/>
  <text x="989" y="518" text-anchor="middle" class="small">align visual interaction features</text>
  <rect x="858" y="540" width="262" height="34" class="chip"/>
  <text x="989" y="562" text-anchor="middle" class="small">inject CLIP semantic knowledge</text>
  <text x="989" y="586" text-anchor="middle" class="tiny">efficient transfer instead of repeated CLIP inference</text>

  <path d="M392 515 C426 515, 444 515, 478 515" class="purpleLine"/>
  <path d="M738 515 C772 515, 790 515, 824 515" class="purpleLine"/>
  <path d="M989 430 C980 386, 924 350, 787 300" class="purpleLine"/>

  <rect x="508" y="350" width="388" height="48" class="note"/>
  <text x="702" y="380" text-anchor="middle" class="small">CLIP knowledge guides the 1-stage HOI detector during learning</text>

  <rect x="61" y="643" width="1158" height="42" rx="18" fill="#0f172a" opacity="0.92"/>
  <text x="640" y="670" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">
    Key idea: predict human-object interactions end-to-end while transferring CLIP text semantics into HOI classification.
  </text>
</svg>
